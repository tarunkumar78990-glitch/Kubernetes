# SLO recording rules - PLAIN Prometheus format.
#
# NOTE: raw rule groups, NOT PrometheusRule CRDs. We run plain Prometheus, not
# the Prometheus Operator, so it reads these directly via
#   rule_files: /etc/prometheus/rules/*.yaml
# A CRD here would never be read at all.
#
# Pattern from the Google SRE Workbook: record the success ratio over several
# windows, then alert on BURN RATE rather than raw errors.
#
# Why burn rate: a 99.9% target allows 43 minutes of downtime per 30 days.
# Alert on "error rate > 0" and you page for a blip costing 4 seconds of
# budget. Alert on "burning 14.4x the sustainable rate" and you page only when
# the incident will genuinely exhaust it.
groups:
- name: slo_recording
  interval: 30s
  rules:
  - record: slo:frontend:availability_target
    expr: 0.999
  - record: slo:frontend:success_ratio5m
    expr: |
      sum(rate(http_requests_total{app="frontend",status_code!~"5.."}[5m]))
      /
      sum(rate(http_requests_total{app="frontend"}[5m]))
  - record: slo:frontend:success_ratio30m
    expr: |
      sum(rate(http_requests_total{app="frontend",status_code!~"5.."}[30m]))
      /
      sum(rate(http_requests_total{app="frontend"}[30m]))
  - record: slo:frontend:success_ratio1h
    expr: |
      sum(rate(http_requests_total{app="frontend",status_code!~"5.."}[1h]))
      /
      sum(rate(http_requests_total{app="frontend"}[1h]))
  - record: slo:frontend:success_ratio6h
    expr: |
      sum(rate(http_requests_total{app="frontend",status_code!~"5.."}[6h]))
      /
      sum(rate(http_requests_total{app="frontend"}[6h]))
  - record: slo:frontend:latency_good_ratio5m
    expr: |
      sum(rate(http_request_duration_seconds_bucket{app="frontend",le="0.5"}[5m]))
      /
      sum(rate(http_request_duration_seconds_count{app="frontend"}[5m]))
  - record: slo:frontend:latency_good_ratio1h
    expr: |
      sum(rate(http_request_duration_seconds_bucket{app="frontend",le="0.5"}[1h]))
      /
      sum(rate(http_request_duration_seconds_count{app="frontend"}[1h]))
  - record: slo:frontend:error_budget_remaining
    expr: |
      1 - (
        (1 - (
          sum(rate(http_requests_total{app="frontend",status_code!~"5.."}[30d]))
          /
          sum(rate(http_requests_total{app="frontend"}[30d]))
        ))
        /
        0.001
      )
