# Cause-based alerts - PLAIN Prometheus format.
#
# Deliberately few. Symptom-based SLO alerts (burn rate) are what should page
# you. These exist only where the cause is actionable and the symptom would
# arrive too late to help.
groups:
- name: infrastructure
  interval: 30s
  rules:
  - alert: NodeNotReady
    expr: kube_node_status_condition{condition="Ready",status="true"} == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Node {{ $labels.node }} is NotReady
      description: This cluster has 2 nodes. One down means half the capacity is gone and PodDisruptionBudgets
        may start blocking deployments.
  - alert: NodeMemoryPressure
    expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Node {{ $labels.node }} under memory pressure
      description: The kubelet will start evicting pods.
  - alert: PodCrashLooping
    expr: 'rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3

      '
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: '{{ $labels.namespace }}/{{ $labels.pod }} is crash looping'
      description: More than 3 restarts in 15 minutes. Check whether the liveness probe is checking a
        dependency it shouldn't.
  - alert: PodNotReady
    expr: "sum by (namespace, pod) (\n  kube_pod_status_ready{condition=\"false\"}\n) > 0\n"
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: '{{ $labels.namespace }}/{{ $labels.pod }} not ready for 15m'
  - alert: DeploymentReplicasMismatch
    expr: "kube_deployment_spec_replicas\n  != kube_deployment_status_replicas_available\n"
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: '{{ $labels.namespace }}/{{ $labels.deployment }} has missing replicas'
      description: Often a stuck rollout or an unschedulable pod on a full node.
  - alert: HPAMaxedOut
    expr: "kube_horizontalpodautoscaler_status_current_replicas\n  >= kube_horizontalpodautoscaler_spec_max_replicas\n"
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: HPA {{ $labels.horizontalpodautoscaler }} is at max replicas
      description: No headroom left. On a 2-node cluster, raising maxReplicas may not help - check node
        allocatable first.
  - alert: PersistentHighMemoryUsage
    expr: "(\n  container_memory_working_set_bytes{container!=\"\"}\n  /\n  container_spec_memory_limit_bytes{container!=\"\
      \"}\n) > 0.9\n"
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: '{{ $labels.namespace }}/{{ $labels.pod }} near its memory limit'
      description: OOMKill is imminent. Memory is not compressible.
  - alert: ContainerOOMKilled
    expr: 'increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) > 0

      '
    labels:
      severity: warning
    annotations:
      summary: '{{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled'
  - alert: NamespaceQuotaNearlyFull
    expr: "(\n  kube_resourcequota{type=\"used\"}\n  /\n  ignoring(type) kube_resourcequota{type=\"hard\"\
      }\n) > 0.9\n"
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: Namespace {{ $labels.namespace }} quota {{ $labels.resource }} above 90%
