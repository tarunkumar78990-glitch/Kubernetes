# Multi-window, multi-burn-rate alerts - PLAIN Prometheus format.
#
# Four alerts per service:
#   fast burn (14.4x, 5m AND 1h) -> page. Budget gone in ~2 days.
#   slow burn (6x, 30m AND 6h)   -> ticket. Real but not urgent.
#   latency SLO                  -> ticket.
#   budget exhausted             -> page + freeze releases.
#
# The `and` between two windows is the important part. The short window makes
# the alert fast; the long window stops a 30-second blip from paging you.
# Either window alone forces a choice between slow alerts and a noisy pager.
groups:
- name: slo_burn_rate
  interval: 30s
  rules:
  - alert: FrontendErrorBudgetFastBurn
    expr: |
      (
        (1 - slo:frontend:success_ratio5m) > (0.0144)
        and
        (1 - slo:frontend:success_ratio1h) > (0.0144)
      )
    for: 2m
    labels:
      severity: critical
      service: frontend
      tier: '1'
      slo: availability
    annotations:
      summary: frontend is burning error budget 14.4x too fast
      description: frontend is returning 5xx well above target. At this rate the 30-day budget is exhausted
        in about 2 days.
      runbook_url: https://github.com/YOUR_ORG/platform-ops/blob/main/runbooks/frontend.md
  - alert: FrontendErrorBudgetSlowBurn
    expr: |
      (
        (1 - slo:frontend:success_ratio30m) > (0.006)
        and
        (1 - slo:frontend:success_ratio6h) > (0.006)
      )
    for: 15m
    labels:
      severity: warning
      service: frontend
      tier: '1'
      slo: availability
    annotations:
      summary: frontend is burning error budget 6x too fast
      description: Real but not urgent. Ticket, do not page.
      runbook_url: https://github.com/YOUR_ORG/platform-ops/blob/main/runbooks/frontend.md
  - alert: FrontendLatencySLOBreach
    expr: |
      slo:frontend:latency_good_ratio1h < 0.999
    for: 10m
    labels:
      severity: warning
      service: frontend
      slo: latency
    annotations:
      summary: frontend latency SLO breached (500ms)
      description: Fewer than 99.9% of requests completed within 500ms over the last hour.
      runbook_url: https://github.com/YOUR_ORG/platform-ops/blob/main/runbooks/frontend.md
  - alert: FrontendErrorBudgetExhausted
    expr: |
      slo:frontend:error_budget_remaining <= 0
    for: 5m
    labels:
      severity: critical
      service: frontend
      tier: '1'
    annotations:
      summary: frontend has exhausted its 30-day error budget
      description: Freeze feature releases for frontend and spend the next cycle on reliability work.
        This is the error budget policy doing its job.
      runbook_url: https://github.com/YOUR_ORG/platform-ops/blob/main/runbooks/frontend.md
