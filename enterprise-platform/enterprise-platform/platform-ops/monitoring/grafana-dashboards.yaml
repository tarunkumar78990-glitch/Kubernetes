# Auto-provision the dashboard. A dashboard built by clicking in the UI
# lives only in that Grafana's database - rebuild the pod and it is gone.
# This one is in Git.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
    - name: 'platform'
      orgId: 1
      folder: 'Platform'
      type: file
      disableDeletion: false
      updateIntervalSeconds: 30
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards
