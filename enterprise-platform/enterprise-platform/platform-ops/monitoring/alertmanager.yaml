apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    # Routing is where you stop your pager from being useless.
    route:
      receiver: 'default'
      group_by: ['alertname', 'service']
      # Wait 30s to bundle related alerts - during a real incident you get
      # ONE page listing five services, not five pages.
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
      # Tier-1 critical goes to PagerDuty and wakes someone.
      - matchers:
        - severity = "critical"
        receiver: 'pagerduty'
        group_wait: 10s
        repeat_interval: 1h

      # Warnings become tickets. They must never page.
      - matchers:
        - severity = "warning"
        receiver: 'slack-warnings'
        repeat_interval: 12h

      # Dev/staging never pages anyone. Ever.
      - matchers:
        - namespace =~ "dev|staging"
        receiver: 'slack-noise'
        repeat_interval: 24h

    inhibit_rules:
    # If a node is down, don't also page for every pod on it.
    - source_matchers:
      - alertname = "NodeNotReady"
      target_matchers:
      - severity =~ "warning|critical"
      equal: ['node']

    # If the budget is exhausted, the fast-burn alert is redundant noise.
    - source_matchers:
      - alertname =~ ".*ErrorBudgetExhausted"
      target_matchers:
      - alertname =~ ".*ErrorBudgetFastBurn"
      equal: ['service']

    receivers:
    - name: 'default'
      slack_configs:
      - api_url: 'REPLACE_WITH_SLACK_WEBHOOK'
        channel: '#platform-alerts'

    - name: 'pagerduty'
      pagerduty_configs:
      - routing_key: 'REPLACE_WITH_PAGERDUTY_ROUTING_KEY'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          runbook: '{{ .CommonAnnotations.runbook_url }}'
          service: '{{ .CommonLabels.service }}'

    - name: 'slack-warnings'
      slack_configs:
      - api_url: 'REPLACE_WITH_SLACK_WEBHOOK'
        channel: '#platform-warnings'
        title: '{{ .CommonAnnotations.summary }}'
        text: 'Runbook: {{ .CommonAnnotations.runbook_url }}'

    - name: 'slack-noise'
      slack_configs:
      - api_url: 'REPLACE_WITH_SLACK_WEBHOOK'
        channel: '#platform-dev-noise'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.27.0
        args:
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --storage.path=/alertmanager
        ports:
        - containerPort: 9093
          name: web
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: storage
          mountPath: /alertmanager
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
  - name: web
    port: 9093
    targetPort: web
