apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ${NAMESPACE}
  labels:
    app: frontend
    env: ${ENVIRONMENT}
  annotations:
    # Container-native load balancing. Without this, GKE routes through
    # node instance groups, which adds a hop and loses the real client IP.
    cloud.google.com/neg: '{"ingress": true}'
    # Points the LB health check at /readyz instead of the default "/".
    # We have no "/" route - the default check would 404 and every backend
    # would be marked UNHEALTHY. This is the #1 cause of "my GKE Ingress
    # returns 502".
    cloud.google.com/backend-config: '{"default": "frontend-backendconfig"}'
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
