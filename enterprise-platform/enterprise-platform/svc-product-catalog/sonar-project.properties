    # SonarQube project configuration for svc-product-catalog
    #
    # The quality gate defined in the SonarQube UI is what actually blocks the
    # pipeline (see the 'Quality gate' stage in the Jenkinsfile). This file
    # only tells the scanner what to look at.

    sonar.projectKey=svc-product-catalog
    sonar.projectName=svc-product-catalog
    sonar.projectVersion=1.0
    sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=node_modules/**,coverage/**,k8s/**

    sonar.sourceEncoding=UTF-8

    # New Code definition: we gate on new code, not the whole history.
    # Gating on total coverage on day one just makes everyone disable the gate.
    sonar.newCode.referenceBranch=develop
