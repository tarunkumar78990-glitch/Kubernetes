apiVersion: v1
kind: ServiceAccount
metadata:
  name: recommendation
  namespace: ${NAMESPACE}
  annotations:
    # This binds the K8s SA to the GCP SA created by the
    # workload-identity Terraform module. Get the exact value from:
    #   terraform output workload_identity_service_accounts
    iam.gke.io/gcp-service-account: ${ENVIRONMENT}-recommendation@${PROJECT_ID}.iam.gserviceaccount.com
  labels:
    app: recommendation
automountServiceAccountToken: true
